name: "Deploy Maven Site to GitHub Pages"

on:
    workflow_dispatch: # Allows manual triggering via the GitHub UI
    push:
        branches:  [ "dev" ] 
    pull_request:
        branches:  [ "main" ]  # Triggers on pull requests targeting the main branch

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: "pages"
    cancel-in-progress: false

env:
    MAVEN_OPTS: "-Dgpg.skip=true -Djdk.io.File.allowDeleteReadOnlyFiles=true --enable-native-access=ALL-UNNAMED"

jobs:
    deploy:
        environment:
            name: "github-pages"
            url: "${{ steps.deployment.outputs.page_url }}"
        runs-on: "ubuntu-latest"

        if: |
            github.event_name == 'workflow_dispatch' || 
            (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy site]'))  ||
            (github.event_name == 'pull_request' && contains(github.event.pull_request.title, '[deploy site]'))

        steps:
            - name: "Checkout Repository"
              uses: actions/checkout@v5

            - name: "Set up JDK 25"
              uses: actions/setup-java@v5
              with:
                  java-version: "25"
                  distribution: "temurin"
                  cache: "maven"

            - name: "Build Site"
              run: xvfb-run --auto-servernum mvn -B clean compile jlink:jlink verify site --file pom.xml

            - name: "Upload Artifact"
              uses: actions/upload-pages-artifact@v5
              with:
                  path: "target/site"

            - name: "Deploy to GitHub Pages"
              id: deployment
              uses: actions/deploy-pages@v5
