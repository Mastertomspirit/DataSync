name: "CodeQL"

on:
  push:
    branches: [ "main", "dev", "features*" ]
  pull_request:
    # The branches below must be a subset of the branches above
    branches: [ "main", "dev" ]
  schedule:
    - cron: '38 9 * * 0'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'java' ]

    env:
      MAVEN_OPTS: "-Dgpg.skip=true -Djdk.io.File.allowDeleteReadOnlyFiles=true --enable-native-access=ALL-UNNAMED"

    steps: 
    - name: Checkout repository
      uses: actions/checkout@v7
      
    - name: Setup Java JDK
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven'

    # Initializes the CodeQL tools for scanning.
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}

    - name: Build-with-maven
      run: xvfb-run --auto-servernum mvn -B clean compile jlink:jlink verify --file pom.xml

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
